name: Compile Weekly Support Report

on:
  schedule:
    # Sunday 11:00 UTC = 6:00 AM Central during DST, 5:00 AM during standard time
    - cron: '0 11 * * 0'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python compile.py

      - name: Commit and push
        run: |
          git config user.name "ASRE Bot"
          git config user.email "bot@amystockberger.com"
          git add reports/
          git diff --cached --quiet || git commit -m "Weekly compile: $(date -u +%Y-W%V)"
          git push
